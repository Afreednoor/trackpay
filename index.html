<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>GymTrack – Member Payment System</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">💪</span>
        <span class="logo-text">GymTrack</span>
      </div>
      <button class="btn-add" id="openAddModal">+ Add Member</button>
    </div>
  </header>

  <!-- DASHBOARD STATS -->
  <section class="dashboard">
    <div class="stat-card" id="stat-total">
      <div class="stat-number" id="totalCount">0</div>
      <div class="stat-label">Total Members</div>
    </div>
    <div class="stat-card active" id="stat-active">
      <div class="stat-number" id="activeCount">0</div>
      <div class="stat-label">Active</div>
    </div>
    <div class="stat-card expired" id="stat-expired">
      <div class="stat-number" id="expiredCount">0</div>
      <div class="stat-label">Expired</div>
    </div>
    <div class="stat-card unpaid" id="stat-unpaid">
      <div class="stat-number" id="unpaidCount">0</div>
      <div class="stat-label">Unpaid</div>
    </div>
  </section>

  <!-- SEARCH + FILTER -->
  <section class="controls">
    <input type="text" id="searchInput" class="search-input" placeholder="🔍  Search by name or phone…" />
    <div class="filter-tabs">
      <button class="tab active" data-filter="all">All</button>
      <button class="tab" data-filter="active">Active</button>
      <button class="tab" data-filter="expired">Expired</button>
      <button class="tab" data-filter="unpaid">Unpaid</button>
    </div>
  </section>

  <!-- MEMBER LIST -->
  <section class="member-list" id="memberList">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">🏋️</div>
      <p>No members yet.<br/>Tap <strong>+ Add Member</strong> to get started.</p>
    </div>
  </section>

  <!-- ADD MEMBER MODAL -->
  <div class="modal-overlay" id="addModal">
    <div class="modal">
      <div class="modal-header">
        <h2>Add New Member</h2>
        <button class="modal-close" id="closeAddModal">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Full Name *</label>
          <input type="text" id="memberName" placeholder="e.g. Ravi Kumar" />
        </div>
        <div class="form-group">
          <label>Phone Number *</label>
          <input type="tel" id="memberPhone" placeholder="e.g. 9876543210" />
        </div>
        <div class="form-group">
          <label>Join Date *</label>
          <input type="date" id="memberJoinDate" />
        </div>
        <div class="form-group">
          <label>Duration</label>
          <select id="memberDuration">
            <option value="1">1 Month</option>
            <option value="2">2 Months</option>
            <option value="3">3 Months</option>
            <option value="6">6 Months</option>
            <option value="12">12 Months</option>
          </select>
        </div>
        <div class="form-group">
          <label>Fee Amount (₹) *</label>
          <input type="number" id="memberFee" placeholder="e.g. 1500" />
        </div>
        <div class="form-group">
          <label>Payment Status</label>
          <div class="toggle-group">
            <button class="toggle-btn active" id="togglePaid" data-value="paid">✅ Paid</button>
            <button class="toggle-btn" id="toggleUnpaid" data-value="unpaid">❌ Unpaid</button>
          </div>
        </div>
        <div class="form-error" id="formError"></div>
        <button class="btn-submit" id="submitMember">Add Member</button>
      </div>
    </div>
  </div>

  <!-- EDIT MEMBER MODAL -->
  <div class="modal-overlay" id="editModal">
    <div class="modal">
      <div class="modal-header">
        <h2>Edit Member</h2>
        <button class="modal-close" id="closeEditModal">✕</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="editMemberId" />
        <div class="form-group">
          <label>Full Name *</label>
          <input type="text" id="editMemberName" />
        </div>
        <div class="form-group">
          <label>Phone Number *</label>
          <input type="tel" id="editMemberPhone" />
        </div>
        <div class="form-group">
          <label>Join Date *</label>
          <input type="date" id="editMemberJoinDate" />
        </div>
        <div class="form-group">
          <label>Duration</label>
          <select id="editMemberDuration">
            <option value="1">1 Month</option>
            <option value="2">2 Months</option>
            <option value="3">3 Months</option>
            <option value="6">6 Months</option>
            <option value="12">12 Months</option>
          </select>
        </div>
        <div class="form-group">
          <label>Fee Amount (₹) *</label>
          <input type="number" id="editMemberFee" />
        </div>
        <div class="form-group">
          <label>Payment Status</label>
          <div class="toggle-group">
            <button class="toggle-btn" id="editTogglePaid" data-value="paid">✅ Paid</button>
            <button class="toggle-btn" id="editToggleUnpaid" data-value="unpaid">❌ Unpaid</button>
          </div>
        </div>
        <div class="form-error" id="editFormError"></div>
        <button class="btn-submit" id="submitEditMember">Save Changes</button>
      </div>
    </div>
  </div>

  <!-- DELETE CONFIRM MODAL -->
  <div class="modal-overlay" id="deleteModal">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h2>Delete Member?</h2>
        <button class="modal-close" id="closeDeleteModal">✕</button>
      </div>
      <div class="modal-body">
        <p id="deleteConfirmText">Are you sure you want to delete this member?</p>
        <div class="delete-actions">
          <button class="btn-cancel" id="cancelDelete">Cancel</button>
          <button class="btn-delete-confirm" id="confirmDelete">Delete</button>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
